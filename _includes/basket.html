<style>
#basket-toggle {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  width: 3.5rem;
  height: 3.5rem;
  background: #424242;
  color: white;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  z-index: 1000;
}
#basket-toggle:hover { background: #111; }

#basket-count {
  position: absolute;
  top: -4px;
  right: -4px;
  background: #d32f2f;
  color: white;
  border-radius: 50%;
  width: 1.25rem;
  height: 1.25rem;
  font-size: 0.7rem;
  display: none;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

#basket-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1001;
}
#basket-overlay.open { display: block; }

#basket-drawer {
  position: fixed;
  top: 0;
  right: -400px;
  width: 360px;
  max-width: 100vw;
  height: 100%;
  background: white;
  box-shadow: -2px 0 16px rgba(0,0,0,0.15);
  z-index: 1002;
  transition: right 0.25s ease;
  display: flex;
  flex-direction: column;
  padding: 1.5rem;
  box-sizing: border-box;
}
#basket-drawer.open { right: 0; }

.basket-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid #eee;
}
.basket-header h2 { margin: 0; font-size: 1.2rem; }

#basket-close {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: #999;
  line-height: 1;
  padding: 0;
}
#basket-close:hover { color: #333; }

#basket-items { flex: 1; overflow-y: auto; }

.basket-empty { color: #999; font-style: italic; margin: 0; }

.basket-item {
  border-bottom: 1px solid #f0f0f0;
  padding: 0.8rem 0;
}
.basket-item-info {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 0.5rem;
  margin-bottom: 0.4rem;
}
.basket-item-name { font-size: 0.9rem; }
.basket-item-price { font-weight: bold; font-size: 0.9rem; white-space: nowrap; }

.basket-item-controls {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.basket-qty-btn {
  width: 1.75rem;
  height: 1.75rem;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  border-radius: 3px;
  font-size: 1rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.basket-qty-btn:hover { background: #f5f5f5; }
.basket-qty { min-width: 1.5rem; text-align: center; font-size: 0.9rem; }
.basket-remove {
  margin-left: auto;
  background: none;
  border: none;
  color: #bbb;
  cursor: pointer;
  font-size: 0.85rem;
  padding: 0 0.2rem;
}
.basket-remove:hover { color: #d32f2f; }

.basket-footer {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 2px solid #333;
}
.basket-total-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 1rem;
  font-size: 1rem;
}
.basket-total-label { color: #555; }
#basket-total { font-weight: bold; font-size: 1.1rem; }

#basket-checkout-btn {
  width: 100%;
  padding: 0.8rem;
  background: #424242;
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 1rem;
  cursor: pointer;
}
#basket-checkout-btn:hover:not(:disabled) { background: #111; }
#basket-checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<button id="basket-toggle" onclick="openBasket()" aria-label="Open basket">
  🛒
  <span id="basket-count"></span>
</button>

<div id="basket-overlay"></div>

<div id="basket-drawer" aria-label="Basket">
  <div class="basket-header">
    <h2>Basket</h2>
    <button id="basket-close" onclick="closeBasket()" aria-label="Close basket">&#10005;</button>
  </div>
  <div id="basket-items"></div>
  <div class="basket-footer">
    <div class="basket-total-row">
      <span class="basket-total-label">Total</span>
      <span id="basket-total"></span>
    </div>
    <button id="basket-checkout-btn" onclick="checkout()" disabled>Checkout</button>
  </div>
</div>

<script src="/assets/basket.js"></script>
